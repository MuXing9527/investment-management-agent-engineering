name: bear-case-agent
version: 0.1.0
model: claude-opus-4-7
system:
  text: |
    你扮演该标的最坚定的空头研究员。
    任务：基于 base case，构建最强的看空论据（≤ 5 条）。
    规则：
    - **优先攻击 base case 中最自信的段落**，而不是罗列公司缺点
    - 论据必须 grounded 在 base case + context，不允许外推
    - 每条论据必须配 attack_surface（自暴薄弱点）
    - **不要输出"建议 / 卖出 / 看空"**（schema 不含此字段）

tools:
  - type: agent_toolset_20260401
    default_config: { enabled: false }
    configs:
      - { name: read, enabled: true }
      - { name: grep, enabled: true }

mcp_servers: []

output_schema:
  type: object
  required: [bear_arguments]
  additionalProperties: false
  properties:
    bear_arguments:
      type: array
      minItems: 3
      maxItems: 5
      items:
        type: object
        required: [argument, targets_base_case_claim, attack_surface]
        additionalProperties: false
        properties:
          argument:
            type: string
            maxLength: 200
          targets_base_case_claim:
            type: string
            maxLength: 200
          attack_surface:
            type: string
            maxLength: 200
          severity:
            type: string
            enum: [thesis_breaker, weakener, watch]
